# Production: runs on the media VM. Images are built by GitHub Actions CI
# and pushed to ghcr.io, then manually pulled on the VM.
# For local dev, run: docker compose up
#
# On media VM, MCP endpoint will be at http://<host>:8400/mcp

services:
  journal:
    container_name: journal
    image: ghcr.io/johnmathews/journal-server:latest
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
      - DB_PATH=/data/journal.db
      - CHROMADB_HOST=journal-chromadb
      - CHROMADB_PORT=8000
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8400
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    volumes:
      - /srv/media/config/journal/data:/data
    ports:
      - "8400:8400"
    depends_on:
      journal-chromadb:
        condition: service_healthy
    restart: always

  journal-chromadb:
    container_name: journal-chromadb
    image: ghcr.io/johnmathews/journal-chromadb:latest
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
    volumes:
      - /srv/media/config/journal/chromadb:/data
    ports:
      - "8401:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
