# Operator-managed entity-casing exceptions.
# Keys are the lowercased form of the entity name; values are the preserved-case canonical
# form to write back. Lookup is case-insensitive; output is exactly what's on the right.
#
# After editing this file, reload without restarting the server:
#   curl -X POST <admin-reload-endpoint>/entity-casing
#
# The mood-dimensions.toml admin reload tab in the webapp also surfaces a button for this.

[meta]
version = "2026-05-08"
description = "Preserved-case overrides for smart-title-case entity normalization."

[exceptions]
# --- Tech brands (mixed case) ---
"ios" = "iOS"
"iphone" = "iPhone"
"ipad" = "iPad"
"ipod" = "iPod"
"imac" = "iMac"
"macos" = "macOS"
"github" = "GitHub"
"gitlab" = "GitLab"
"linkedin" = "LinkedIn"
"ebay" = "eBay"
"youtube" = "YouTube"
"whatsapp" = "WhatsApp"
"postgresql" = "PostgreSQL"
"mysql" = "MySQL"
"mongodb" = "MongoDB"
"graphql" = "GraphQL"
"devops" = "DevOps"
"chatgpt" = "ChatGPT"
"openai" = "OpenAI"
"wifi" = "WiFi"
"javascript" = "JavaScript"
"typescript" = "TypeScript"
"claude.code" = "Claude Code"
"ghcr.io" = "ghcr.io"

# --- Acronyms (all caps, length > 1) ---
# These are also detected verbatim by the algorithm when the input is already
# all-caps, but listing them ensures lowercase / mixed-case input is corrected.
