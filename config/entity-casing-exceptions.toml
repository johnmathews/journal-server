# --- Names with apostrophes / Dutch particles that need explicit casing ---
"o'brien" = "O'Brien"
"o'reilly" = "O'Reilly"
"mcdonald's" = "McDonald's"
"mcdonalds" = "McDonald's"
"'t gooi" = "'t Gooi"

# --- Place-name leading articles (handled by algorithm, but listed for clarity / overrides) ---
"the netherlands" = "The Netherlands"
"the hague" = "The Hague"
"den haag" = "Den Haag"
